<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>ヤフオク!アプリへ</title>
<style>
  body { margin: 0; background: #111214; color: #eee;
         font-family: -apple-system, "Hiragino Sans", sans-serif;
         display: flex; min-height: 100vh; align-items: center; justify-content: center; }
  main { text-align: center; padding: 24px; width: 100%; max-width: 420px; }
  #msg { color: #ff6b6b; font-size: 16px; min-height: 1.2em; margin: 0 0 8px; }
  a.primary { display: block; background: #e02f2f; color: #fff; text-decoration: none;
              font-size: 20px; font-weight: 700; padding: 18px 16px;
              border-radius: 14px; margin: 12px 0 0; }
  a.fallback { display: inline-block; color: #8ab4f8; font-size: 14px; margin-top: 16px; }
</style>
</head>
<body>
<main>
  <p id="msg"></p>
  <div id="actions" hidden>
    <a id="applink" class="primary">ヤフオク!アプリで開く</a>
    <a id="weblink" class="fallback">ブラウザで開く</a>
  </div>
</main>
<script>
(function () {
  var msg = document.getElementById("msg");
  var id = new URLSearchParams(location.search).get("id") || "";
  const idPattern = /^[a-z][0-9]{10}$/;
  if (!idPattern.test(id)) {
    msg.textContent = "不正なIDです";
    return;
  }
  document.getElementById("applink").href = "yjauctions://auctionitem?auctionid=" + id;
  document.getElementById("weblink").href = "https://page.auctions.yahoo.co.jp/jp/auction/" + id;
  document.getElementById("actions").hidden = false;
  location.replace("yjauctions://auctionitem?auctionid=" + id);
})();
</script>
</body>
</html>
